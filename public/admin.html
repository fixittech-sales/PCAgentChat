<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Agent Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
      --accent: #4f8ef7; --text: #f0f0f0; --text-muted: #888;
      --danger: #ef4444; --success: #22c55e;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
    input, select {
      width: 100%; padding: 10px 14px; background: #111; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    .field { margin-bottom: 14px; }
    button {
      padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 14px; font-weight: 600; transition: background 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #3a6dd4; }
    .btn-primary:disabled { background: #333; cursor: default; }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 6px 12px; font-size: 13px; }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }
    .btn-small { padding: 6px 14px; font-size: 13px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 8px 10px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border); }
    td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .link-cell { display: flex; align-items: center; gap: 8px; }
    .link-text { font-family: monospace; font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
    .copy-btn { flex-shrink: 0; padding: 4px 10px; background: #222; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; cursor: pointer; }
    .copy-btn:hover { background: #333; }
    .copy-btn.copied { color: var(--success); border-color: var(--success); }
    .empty { text-align: center; padding: 32px; color: var(--text-muted); font-size: 14px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
    .tab { padding: 10px 20px; font-size: 14px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; background: none; border-radius: 0; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Conversations */
    .convo-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
    .convo-header { padding: 14px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
    .convo-header:hover { background: #222; }
    .convo-info { display: flex; flex-direction: column; gap: 2px; }
    .convo-name { font-weight: 600; font-size: 15px; }
    .convo-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; }
    .convo-arrow { font-size: 14px; color: var(--text-muted); transition: transform 0.2s; }
    .convo-card.open .convo-arrow { transform: rotate(180deg); }
    .convo-body { display: none; border-top: 1px solid var(--border); padding: 14px 18px; max-height: 400px; overflow-y: auto; }
    .convo-card.open .convo-body { display: block; }
    .msg { margin-bottom: 10px; }
    .msg:last-child { margin-bottom: 0; }
    .msg-bubble { padding: 8px 12px; border-radius: 10px; font-size: 13px; line-height: 1.5; max-width: 85%; word-wrap: break-word; overflow-wrap: break-word; }
    .msg-bubble img { max-width: 200px; border-radius: 6px; margin-top: 4px; }
    .msg-user .msg-bubble { background: var(--accent); color: #fff; margin-left: auto; }
    .msg-agent .msg-bubble { background: #2a2a2a; color: var(--text); }
    .msg-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .msg-user .msg-time { text-align: right; }
    .refresh-bar { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-bottom: 16px; }
    .refresh-status { font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>
<div class="container">
  <h1>&#9881;&#65039; Agent Chat Admin</h1>

  <div class="tabs">
    <div class="tab active" data-tab="clients">Clients</div>
    <div class="tab" data-tab="conversations">Conversations</div>
  </div>

  <!-- Clients Tab -->
  <div class="tab-panel active" id="tab-clients">
    <div class="card">
      <h2>Add Client</h2>
      <div class="field">
        <label>Friend's Name</label>
        <input type="text" id="inp-name" placeholder="e.g. Ny, Tim&hellip;" />
      </div>
      <div class="field">
        <label>Assign Agent</label>
        <select id="inp-agent">
          <option value="">Loading agents&hellip;</option>
        </select>
      </div>
      <button class="btn-primary" id="create-btn" disabled>Create Chat Link</button>
    </div>

    <div class="card">
      <h2>Active Clients</h2>
      <div id="clients-table">
        <div class="empty">Loading&hellip;</div>
      </div>
    </div>
  </div>

  <!-- Conversations Tab -->
  <div class="tab-panel" id="tab-conversations">
    <div class="refresh-bar">
      <button class="btn-primary btn-small" id="refresh-convos">&#8635; Refresh</button>
    </div>
    <div id="convos-list">
      <div class="empty">Loading conversations&hellip;</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  var key = new URLSearchParams(location.search).get('key') || '';
  var headers = { 'x-admin-key': key, 'Content-Type': 'application/json' };
  var origin = location.origin;
  var agentCompanyMap = {};

  // Tab switching
  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      if (tab.dataset.tab === 'conversations') loadConversations();
    });
  });

  async function loadAgents() {
    try {
      var res = await fetch('/api/admin/agents', { headers: headers });
      if (!res.ok) throw new Error();
      var companies = await res.json();
      var sel = document.getElementById('inp-agent');
      sel.innerHTML = '<option value="">Select agent…</option>';

      companies.forEach(function(company) {
        if (!company.agents || !company.agents.length) return;
        var grp = document.createElement('optgroup');
        grp.label = company.companyName;
        company.agents.forEach(function(a) {
          agentCompanyMap[a.id] = company.companyId;
          var o = document.createElement('option');
          o.value = a.id;
          o.textContent = a.name + (a.title ? ' (' + a.title + ')' : '');
          grp.appendChild(o);
        });
        sel.appendChild(grp);
      });

      if (sel.options.length <= 1) {
        sel.innerHTML = '<option value="">No agents found</option>';
      } else {
        document.getElementById('create-btn').disabled = false;
      }
    } catch(err) {
      document.getElementById('inp-agent').innerHTML = '<option value="">Failed to load</option>';
    }
  }

  async function loadClients() {
    try {
      var res = await fetch('/api/admin/clients', { headers: headers });
      if (!res.ok) throw new Error();
      var data = await res.json();
      renderClients(data.clients);
    } catch(err) {
      document.getElementById('clients-table').innerHTML = '<div class="empty">Failed to load clients.</div>';
    }
  }

  function renderClients(clients) {
    var el = document.getElementById('clients-table');
    if (!clients.length) {
      el.innerHTML = '<div class="empty">No clients yet. Add one above.</div>';
      return;
    }
    var rows = clients.map(function(c) {
      var link = origin + '/?token=' + c.token;
      var agentName = c.agent_name || c.agent_url_key || 'Agent';
      return '<tr data-id="' + esc(c.id) + '">' +
        '<td><strong>' + esc(c.name) + '</strong></td>' +
        '<td>' + esc(agentName) + '</td>' +
        '<td><div class="link-cell">' +
          '<span class="link-text" title="' + esc(link) + '">' + esc(link) + '</span>' +
          '<button class="copy-btn" onclick="copyLink(this,\'' + esc(link) + '\')">Copy</button>' +
        '</div></td>' +
        '<td><button class="btn-danger" onclick="deleteClient(\'' + esc(c.id) + '\')">Delete</button></td>' +
        '</tr>';
    }).join('');
    el.innerHTML = '<table><thead><tr><th>Name</th><th>Agent</th><th>Chat Link</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
  }

  async function loadConversations() {
    var el = document.getElementById('convos-list');
    el.innerHTML = '<div class="empty">Loading conversations&hellip;</div>';
    try {
      var res = await fetch('/api/admin/conversations', { headers: headers });
      if (!res.ok) throw new Error();
      var data = await res.json();
      renderConversations(data.conversations);
    } catch(err) {
      el.innerHTML = '<div class="empty">Failed to load conversations.</div>';
    }
  }

  function renderConversations(conversations) {
    var el = document.getElementById('convos-list');
    if (!conversations.length) {
      el.innerHTML = '<div class="empty">No conversations yet.</div>';
      return;
    }
    el.innerHTML = conversations.map(function(c) {
      var lastAct = c.lastActivity ? timeAgo(new Date(c.lastActivity)) : 'No messages';
      var messagesHtml = c.messages.length ? c.messages.map(function(m) {
        var cls = m.fromUser ? 'msg-user' : 'msg-agent';
        var body = renderMarkdown(m.body);
        var time = new Date(m.createdAt).toLocaleString();
        return '<div class="msg ' + cls + '"><div class="msg-bubble">' + body + '</div><div class="msg-time">' + esc(time) + '</div></div>';
      }).join('') : '<div class="empty">No messages yet.</div>';

      return '<div class="convo-card" onclick="toggleConvo(this)">' +
        '<div class="convo-header">' +
          '<div class="convo-info">' +
            '<span class="convo-name">' + esc(c.clientName) + '</span>' +
            '<div class="convo-meta"><span>' + esc(c.agentName) + '</span><span>' + c.messageCount + ' messages</span><span>' + esc(lastAct) + '</span></div>' +
          '</div>' +
          '<span class="convo-arrow">&#9660;</span>' +
        '</div>' +
        '<div class="convo-body">' + messagesHtml + '</div>' +
      '</div>';
    }).join('');
  }

  function renderMarkdown(text) {
    var s = esc(text);
    // images
    s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" />');
    // links
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent)">$1</a>');
    // bold
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // line breaks
    s = s.replace(/\n/g, '<br>');
    return s;
  }

  function timeAgo(date) {
    var secs = Math.floor((Date.now() - date.getTime()) / 1000);
    if (secs < 60) return 'just now';
    var mins = Math.floor(secs / 60);
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    var days = Math.floor(hrs / 24);
    return days + 'd ago';
  }

  window.toggleConvo = function(card) {
    card.classList.toggle('open');
    if (card.classList.contains('open')) {
      var body = card.querySelector('.convo-body');
      if (body) {
        var pin = function() { body.scrollTop = body.scrollHeight; };
        requestAnimationFrame(function() { pin(); requestAnimationFrame(pin); });
        body.querySelectorAll('img').forEach(function(img) {
          if (!img.complete) img.addEventListener('load', pin, { once: true });
        });
      }
    }
  };

  window.copyLink = function(btn, link) {
    navigator.clipboard.writeText(link).then(function() {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  };

  window.deleteClient = async function(id) {
    if (!confirm('Delete this client? Their conversation will remain in Paperclip.')) return;
    try {
      await fetch('/api/admin/clients/' + id, { method: 'DELETE', headers: headers });
      showToast('Client removed');
      loadClients();
    } catch(err) {
      showToast('Failed to delete');
    }
  };

  document.getElementById('create-btn').addEventListener('click', async function() {
    var name = document.getElementById('inp-name').value.trim();
    var agentId = document.getElementById('inp-agent').value;
    if (!name) { showToast('Enter a name'); return; }
    if (!agentId) { showToast('Select an agent'); return; }

    var companyId = agentCompanyMap[agentId] || null;

    var btn = document.getElementById('create-btn');
    btn.disabled = true;
    btn.textContent = 'Creating…';

    try {
      var res = await fetch('/api/admin/clients', {
        method: 'POST',
        headers: headers,
        body: JSON.stringify({ name: name, agentId: agentId, companyId: companyId }),
      });
      if (!res.ok) throw new Error(await res.text());
      var data = await res.json();
      var link = origin + '/?token=' + data.client.token;
      await navigator.clipboard.writeText(link).catch(function() {});
      showToast('Created! Link copied to clipboard.');
      document.getElementById('inp-name').value = '';
      document.getElementById('inp-agent').value = '';
      loadClients();
    } catch(e) {
      showToast('Error: ' + e.message);
    }

    btn.disabled = false;
    btn.textContent = 'Create Chat Link';
  });

  document.getElementById('refresh-convos').addEventListener('click', function() {
    loadConversations();
  });

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  loadAgents();
  loadClients();
})();
</script>
</body>
</html>
